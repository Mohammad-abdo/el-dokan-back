<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Full Data Export Report</title>
    <style>
      :root {
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --header-bg: #f3f4f6;
        --card-bg: #ffffff;
        --bg: #ffffff;

        --green: #dcfce7;
        --green-text: #166534;
        --amber: #fef3c7;
        --amber-text: #92400e;
        --red: #fee2e2;
        --red-text: #991b1b;
      }

      @page {
        margin: 40px 24px;
      }

      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .cover {
        padding: 48px 40px 36px;
        border: 1px solid var(--border);
        border-radius: 16px;
      }

      .cover-grid {
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 18px;
        align-items: start;
      }

      .logo {
        width: 96px;
        height: 96px;
        object-fit: contain;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: #fafafa;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: -0.02em;
      }

      .sub {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .meta-row {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .meta-row b {
        color: var(--text);
      }

      .page-break {
        page-break-after: always;
      }

      .section {
        margin-top: 22px;
      }

      .section-title {
        font-size: 18px;
        margin: 0 0 10px;
        letter-spacing: -0.01em;
      }

      .pdf-table {
        width: 100%;
        border-collapse: collapse;
        border-spacing: 0;
        font-size: 12px;
        background: var(--card-bg);
      }

      .pdf-table th,
      .pdf-table td {
        border: 1px solid var(--border);
        padding: 8px 10px;
        vertical-align: top;
      }

      .pdf-table th {
        background: var(--header-bg);
        font-weight: 700;
        color: #374151;
      }

      .text-right {
        text-align: right;
      }

      .row-avoid-break {
        page-break-inside: avoid;
      }

      img.thumb {
        width: 28px;
        height: 28px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #f9fafb;
      }

      .badge {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
      }

      .badge.in-stock {
        background: var(--green);
        color: var(--green-text);
      }
      .badge.low-stock {
        background: var(--amber);
        color: var(--amber-text);
      }
      .badge.out-stock {
        background: var(--red);
        color: var(--red-text);
      }

      .badge.pending {
        background: var(--amber);
        color: var(--amber-text);
      }
      .badge.completed {
        background: var(--green);
        color: var(--green-text);
      }
      .badge.cancelled {
        background: var(--red);
        color: var(--red-text);
      }

      .items-cell {
        min-width: 280px;
      }

      .item-line {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 6px;
      }
      .item-line:last-child {
        margin-bottom: 0;
      }
      .item-text {
        flex: 1;
      }
      .item-name {
        font-weight: 700;
      }
      .item-sub {
        color: var(--muted);
        font-size: 11px;
      }
      .muted {
        color: var(--muted);
      }

      @media print {
        body {
          background: white;
        }
      }
    </style>
  </head>
  <body>
    <!-- Cover -->
    <div class="cover">
      <div class="cover-grid">
        <div>
          <img class="logo" src="__COMPANY_LOGO__" alt="Company Logo" />
        </div>
        <div>
          <h1>Full Data Export Report</h1>
          <div class="sub">Premium export with structured sections and product images.</div>
          <div class="meta-row">
            <div><b>Company:</b> __COMPANY_NAME__</div>
            <div><b>Export date:</b> __EXPORT_DATE__</div>
          </div>
        </div>
      </div>
    </div>

    <div class="page-break"></div>

    <!-- Orders -->
    <div class="section">
      <h2 class="section-title">Orders</h2>
      __ORDERS_TABLE__
    </div>

    <div class="page-break"></div>

    <!-- Products -->
    <div class="section">
      <h2 class="section-title">Products</h2>
      __PRODUCTS_TABLE__
    </div>

    <div class="page-break"></div>

    <!-- Plans -->
    <div class="section">
      <h2 class="section-title">Plans</h2>
      __PLANS_TABLE__
    </div>

    <div class="page-break"></div>

    <!-- Representatives -->
    <div class="section">
      <h2 class="section-title">Representatives</h2>
      __REPRESENTATIVES_TABLE__
    </div>

    <div class="page-break"></div>

    <!-- Visits -->
    <div class="section">
      <h2 class="section-title">Visits</h2>
      __VISITS_TABLE__
    </div>
  </body>
</html>
